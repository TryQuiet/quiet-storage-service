version: 0.0
os: linux
files:
  - source: /
    destination: /home/qss-user/qss
permissions:
  - object: /home/qss-user/qss
    owner: qss-user
    pattern: "**"
    mode: 644
    type:
      - directory
      - file
hooks:
  BeforeInstall:
    - location: aws/scripts/before-install.sh
      timeout: 300
      runas: qss-user
  ApplicationStart:
    - location: aws/scripts/application-start.sh
      timeout: 300
      runas: qss-user